<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CodeCraft AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    /* ── Reset & Base ─────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    /* ── Design Tokens ────────────────────────── */
    :root {
      --bg-base:        #0a0c10;
      --bg-surface:     #111520;
      --bg-elevated:    #161c2c;
      --bg-input:       #1a2033;
      --border:         #232d44;
      --border-glow:    #2a3a5e;

      --accent:         #3b82f6;
      --accent-dim:     #1d4ed8;
      --accent-glow:    rgba(59, 130, 246, 0.18);
      --accent-subtle:  rgba(59, 130, 246, 0.08);

      --green:          #10b981;
      --green-dim:      rgba(16, 185, 129, 0.12);

      --text-primary:   #e8edf5;
      --text-secondary: #8896b0;
      --text-muted:     #4a5568;
      --text-code:      #a5f3fc;

      --user-bubble:    linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
      --ai-bubble:      #161c2c;

      --radius-sm:  6px;
      --radius-md:  12px;
      --radius-lg:  18px;
      --radius-xl:  24px;

      --font-ui:   'Tajawal', sans-serif;
      --font-code: 'IBM Plex Mono', monospace;

      --shadow-sm:  0 2px 8px rgba(0,0,0,0.4);
      --shadow-md:  0 4px 20px rgba(0,0,0,0.5);
      --shadow-lg:  0 8px 40px rgba(0,0,0,0.6);
      --shadow-accent: 0 0 20px rgba(59,130,246,0.2);
    }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 15px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* subtle grid pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ───────────────────────────────── */
    .header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }

    .header-logo {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: var(--shadow-accent);
      flex-shrink: 0;
    }

    .header-info { flex: 1; min-width: 0; }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.3px;
    }

    .header-subtitle {
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 1px;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      background: var(--border);
      color: var(--text-primary);
    }

    /* ── Tab Bar ──────────────────────────────── */
    .tab-bar {
      display: flex;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 5;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab:hover:not(.active) {
      color: var(--text-secondary);
    }

    /* ── Main Container ───────────────────────── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* ── Panels ───────────────────────────────── */
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .panel.hidden { display: none; }

    /* ── Chat Messages ────────────────────────── */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .messages-container::-webkit-scrollbar { width: 3px; }
    .messages-container::-webkit-scrollbar-track { background: transparent; }
    .messages-container::-webkit-scrollbar-thumb { background: var(--border-glow); border-radius: 2px; }

    /* ── Message Bubbles ──────────────────────── */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 88%;
      animation: msg-in 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .message.user { align-self: flex-start; }  /* RTL: user on left */
    .message.ai   { align-self: flex-end;   }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(10px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    .bubble {
      padding: 12px 15px;
      border-radius: var(--radius-lg);
      position: relative;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border-radius: var(--radius-lg) var(--radius-sm) var(--radius-lg) var(--radius-lg);
      color: #fff;
      box-shadow: 0 4px 15px rgba(37,99,235,0.35);
    }

    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm) var(--radius-lg) var(--radius-lg) var(--radius-lg);
      color: var(--text-primary);
    }

    .msg-meta {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    .message.user .msg-meta { text-align: left; }
    .message.ai  .msg-meta  { text-align: right; }

    /* ── Markdown in AI bubbles ───────────────── */
    .bubble h1, .bubble h2, .bubble h3 {
      color: var(--accent);
      margin: 10px 0 6px;
      font-weight: 700;
    }
    .bubble h1 { font-size: 16px; }
    .bubble h2 { font-size: 15px; }
    .bubble h3 { font-size: 14px; }

    .bubble p { margin: 6px 0; }
    .bubble ul, .bubble ol { padding-right: 18px; margin: 6px 0; }
    .bubble li { margin: 3px 0; }

    .bubble strong { color: var(--text-primary); font-weight: 700; }
    .bubble em     { color: var(--text-secondary); }

    .bubble code {
      font-family: var(--font-code);
      font-size: 12px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border-glow);
      color: var(--text-code);
      padding: 1px 5px;
      border-radius: 4px;
    }

    /* ── Code Blocks ──────────────────────────── */
    .code-block-wrapper {
      margin: 10px 0;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-glow);
      overflow: hidden;
      background: #0d1117;
    }

    .code-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      background: #161b27;
      border-bottom: 1px solid var(--border);
    }

    .code-lang {
      font-family: var(--font-code);
      font-size: 10px;
      color: var(--accent);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .code-actions { display: flex; gap: 6px; }

    .code-action-btn {
      padding: 3px 9px;
      border-radius: 4px;
      border: 1px solid var(--border-glow);
      background: var(--accent-subtle);
      color: var(--text-secondary);
      font-size: 10px;
      font-family: var(--font-ui);
      cursor: pointer;
      transition: all 0.2s;
    }

    .code-action-btn:hover {
      background: var(--accent-glow);
      color: var(--accent);
      border-color: var(--accent);
    }

    .code-action-btn.copied {
      background: var(--green-dim);
      color: var(--green);
      border-color: var(--green);
    }

    .code-block-wrapper pre {
      margin: 0;
      padding: 14px;
      overflow-x: auto;
      font-family: var(--font-code);
      font-size: 12px;
      line-height: 1.7;
      color: #cdd9e5;
    }

    .code-block-wrapper pre::-webkit-scrollbar { height: 3px; }
    .code-block-wrapper pre::-webkit-scrollbar-thumb { background: var(--border-glow); }

    /* ── Preview Panel ────────────────────────── */
    #preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-base);
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .preview-label {
      flex: 1;
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-code);
    }

    #preview-iframe {
      flex: 1;
      border: none;
      background: #fff;
    }

    .preview-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
    }

    .preview-empty-icon {
      font-size: 40px;
      opacity: 0.3;
    }

    .preview-empty-text {
      font-size: 13px;
      text-align: center;
      max-width: 200px;
    }

    /* ── Typing Indicator ─────────────────────── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm) var(--radius-lg) var(--radius-lg) var(--radius-lg);
      align-self: flex-end;
      max-width: 80px;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%           { transform: scale(1);   opacity: 1;   }
    }

    /* ── Welcome Message ──────────────────────── */
    .welcome-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 24px 20px;
      text-align: center;
      margin: 8px 0;
      animation: msg-in 0.4s ease;
    }

    .welcome-emoji { font-size: 36px; margin-bottom: 10px; }
    .welcome-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .welcome-sub   { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

    .quick-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
      margin-top: 16px;
    }

    .chip {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border-glow);
      background: var(--accent-subtle);
      color: var(--accent);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .chip:hover {
      background: var(--accent-glow);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    /* ── Input Area ───────────────────────────── */
    .input-area {
      padding: 10px 12px 12px;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 8px 8px 8px 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    #user-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 14px;
      resize: none;
      max-height: 130px;
      min-height: 22px;
      line-height: 1.5;
      direction: auto;
    }

    #user-input::placeholder { color: var(--text-muted); }

    #user-input::-webkit-scrollbar { width: 2px; }
    #user-input::-webkit-scrollbar-thumb { background: var(--border); }

    #send-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(59,130,246,0.4);
    }

    #send-btn:hover  { background: var(--accent-dim); transform: scale(1.05); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }

    #send-btn svg { width: 16px; height: 16px; }

    /* ── Toast ────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-elevated);
      border: 1px solid var(--border-glow);
      color: var(--text-primary);
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 12px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Utility ──────────────────────────────── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-logo">⚡</div>
    <div class="header-info">
      <div class="header-title">CodeCraft AI</div>
      <div class="header-subtitle">
        <span class="status-dot"></span>
        متخصص في HTML و اللوقو
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="clear-btn" title="مسح المحادثة">🗑️</button>
    </div>
  </header>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <div class="tab active" data-tab="chat">💬 المحادثة</div>
    <div class="tab"        data-tab="preview">🖥️ معاينة الكود</div>
  </nav>

  <!-- Main -->
  <main class="main">

    <!-- Chat Panel -->
    <div class="panel" id="chat-panel">
      <div class="messages-container" id="messages">

        <!-- Welcome Card -->
        <div class="welcome-card">
          <div class="welcome-emoji">🚀</div>
          <div class="welcome-title">مرحباً! أنا CodeCraft AI</div>
          <div class="welcome-sub">
            متخصص في توليد أكواد HTML الاحترافية<br/>وتصميم الشعارات بتقنية SVG
          </div>
          <div class="quick-chips">
            <div class="chip" onclick="sendQuick('اعمل لي صفحة هبوط احترافية')">🌐 صفحة هبوط</div>
            <div class="chip" onclick="sendQuick('صمم لي لوقو لشركة تقنية')">🎨 لوقو تقني</div>
            <div class="chip" onclick="sendQuick('اعمل لي نموذج تسجيل جميل')">📝 نموذج تسجيل</div>
            <div class="chip" onclick="sendQuick('اعمل لي بطاقة مستخدم بـ CSS')">💳 بطاقة مستخدم</div>
          </div>
        </div>

      </div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="user-input"
            placeholder="اكتب طلبك هنا... مثال: صمم لي لوقو لشركة..."
            rows="1"
          ></textarea>
          <button id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Preview Panel -->
    <div class="panel hidden" id="preview-panel">
      <div class="preview-toolbar">
        <span class="preview-label" id="preview-label">لا يوجد كود للمعاينة</span>
        <button class="code-action-btn" onclick="clearPreview()">مسح</button>
      </div>
      <div class="preview-empty" id="preview-empty">
        <div class="preview-empty-icon">🖥️</div>
        <div class="preview-empty-text">اطلب من البوت توليد كود HTML وستظهر المعاينة هنا تلقائياً</div>
      </div>
      <iframe id="preview-iframe" class="hidden" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>

  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ── Telegram WebApp Init ──────────────────────────
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      tg.setHeaderColor('#111520');
      tg.setBackgroundColor('#0a0c10');
    }

    // ── State ─────────────────────────────────────────
    let chatHistory = [];
    let isLoading   = false;
    let lastHtmlCode = '';

    // ── DOM Refs ──────────────────────────────────────
    const messagesEl  = document.getElementById('messages');
    const inputEl     = document.getElementById('user-input');
    const sendBtn     = document.getElementById('send-btn');
    const previewIframe = document.getElementById('preview-iframe');
    const previewEmpty  = document.getElementById('preview-empty');
    const previewLabel  = document.getElementById('preview-label');

    // ── Tab Switching ─────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const target = tab.dataset.tab;
        document.getElementById('chat-panel').classList.toggle('hidden', target !== 'chat');
        document.getElementById('preview-panel').classList.toggle('hidden', target !== 'preview');
      });
    });

    // ── Auto-resize textarea ──────────────────────────
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';
    });

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ── Quick Chip ────────────────────────────────────
    function sendQuick(text) {
      inputEl.value = text;
      sendMessage();
    }

    // ── Send Message ──────────────────────────────────
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isLoading) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      setLoading(true);

      // Add user bubble
      appendMessage('user', text);

      // Add to history
      chatHistory.push({ role: 'user', content: text });

      // Add typing indicator
      const typingId = addTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: chatHistory.slice(0, -1) })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Server error');
        }

        const data = await res.json();
        removeTyping(typingId);

        appendMessage('ai', data.reply);
        chatHistory.push({ role: 'assistant', content: data.reply });

        // Auto-extract and preview HTML
        extractAndPreview(data.reply);

      } catch (err) {
        removeTyping(typingId);
        appendMessage('ai', `❌ **خطأ:** ${err.message}\n\nتأكد من إعداد متغيرات البيئة على السيرفر.`);
      } finally {
        setLoading(false);
      }
    }

    // ── Append Message ────────────────────────────────
    function appendMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = role === 'ai' ? renderMarkdown(content) : escapeHtml(content);

      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.textContent = formatTime(new Date());

      div.appendChild(bubble);
      div.appendChild(meta);
      messagesEl.appendChild(div);

      // Attach copy buttons
      div.querySelectorAll('.code-action-btn[data-action="copy"]').forEach(btn => {
        btn.addEventListener('click', () => copyCode(btn));
      });
      div.querySelectorAll('.code-action-btn[data-action="preview"]').forEach(btn => {
        btn.addEventListener('click', () => previewCode(btn.dataset.code));
      });

      scrollToBottom();
    }

    // ── Typing Indicator ──────────────────────────────
    function addTyping() {
      const id = 'typing-' + Date.now();
      const el = document.createElement('div');
      el.id = id;
      el.className = 'typing-indicator';
      el.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      messagesEl.appendChild(el);
      scrollToBottom();
      return id;
    }

    function removeTyping(id) {
      document.getElementById(id)?.remove();
    }

    // ── Markdown Renderer ─────────────────────────────
    function renderMarkdown(text) {
      // Code blocks first
      text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
        const l = lang || 'code';
        const escaped = escapeHtml(code.trim());
        const encodedCode = btoa(unescape(encodeURIComponent(code.trim())));
        const isHtml = l.toLowerCase() === 'html' || l.toLowerCase() === 'svg';
        const previewBtn = isHtml
          ? `<button class="code-action-btn" data-action="preview" data-code="${encodedCode}">👁 معاينة</button>`
          : '';
        return `
          <div class="code-block-wrapper">
            <div class="code-block-header">
              <span class="code-lang">${l}</span>
              <div class="code-actions">
                ${previewBtn}
                <button class="code-action-btn" data-action="copy" data-code="${encodedCode}">نسخ</button>
              </div>
            </div>
            <pre><code>${escaped}</code></pre>
          </div>`;
      });

      // Inline code
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Bold
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');

      // Italic
      text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

      // Headers
      text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      text = text.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
      text = text.replace(/^# (.+)$/gm,   '<h1>$1</h1>');

      // Lists
      text = text.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
      text = text.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

      // Paragraphs
      text = text.split('\n\n').map(p => {
        p = p.trim();
        if (!p) return '';
        if (p.startsWith('<')) return p;
        return `<p>${p.replace(/\n/g, '<br>')}</p>`;
      }).join('\n');

      return text;
    }

    // ── Extract and Auto-Preview HTML ─────────────────
    function extractAndPreview(text) {
      const match = text.match(/```(?:html|svg)\n?([\s\S]*?)```/i);
      if (match) {
        lastHtmlCode = match[1].trim();
        updatePreview(lastHtmlCode);
        showToast('✅ تم توليد الكود — اضغط تبويب المعاينة لرؤيته');
      }
    }

    function previewCode(encodedCode) {
      try {
        const code = decodeURIComponent(escape(atob(encodedCode)));
        updatePreview(code);
        // Switch to preview tab
        document.querySelector('[data-tab="preview"]').click();
      } catch (e) {}
    }

    function updatePreview(html) {
      previewIframe.srcdoc = html;
      previewIframe.classList.remove('hidden');
      previewEmpty.classList.add('hidden');
      previewLabel.textContent = 'معاينة الكود المُولَّد';
    }

    function clearPreview() {
      previewIframe.srcdoc = '';
      previewIframe.classList.add('hidden');
      previewEmpty.classList.remove('hidden');
      previewLabel.textContent = 'لا يوجد كود للمعاينة';
    }

    // ── Copy Code ─────────────────────────────────────
    function copyCode(btn) {
      try {
        const code = decodeURIComponent(escape(atob(btn.dataset.code)));
        navigator.clipboard.writeText(code).then(() => {
          btn.textContent = '✓ تم النسخ';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = 'نسخ';
            btn.classList.remove('copied');
          }, 2000);
        });
      } catch (e) {}
    }

    // ── Clear Chat ────────────────────────────────────
    document.getElementById('clear-btn').addEventListener('click', () => {
      chatHistory = [];
      messagesEl.innerHTML = '';
      // Re-add welcome
      const wc = document.createElement('div');
      wc.className = 'welcome-card';
      wc.innerHTML = `
        <div class="welcome-emoji">🚀</div>
        <div class="welcome-title">تم مسح المحادثة</div>
        <div class="welcome-sub">يمكنك بدء محادثة جديدة الآن</div>`;
      messagesEl.appendChild(wc);
      showToast('🗑️ تم مسح المحادثة');
    });

    // ── Helpers ───────────────────────────────────────
    function setLoading(state) {
      isLoading = state;
      sendBtn.disabled = state;
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatTime(d) {
      return d.toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2800);
    }
  </script>
</body>
</html>
